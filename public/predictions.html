<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>预测验证 | NBA洞察者</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <h1>预测验证页</h1>
        <p>输入比赛 id、球员 id 和预测值。Supabase 可用时会云端保存；如果数据库暂停，会自动保存到当前浏览器。</p>
      </section>

      <nav class="nav">
        <a href="/">今日赛程</a>
        <a href="/player">球员分析</a>
        <a href="/players">球员 ID</a>
        <a href="/predictions">预测验证</a>
      </nav>

      <section class="card">
        <div class="form-grid">
          <div>
            <label for="eventId">比赛 id</label>
            <input id="eventId" placeholder="例如 401873198" />
          </div>
          <div>
            <label for="playerId">球员 id</label>
            <input id="playerId" placeholder="例如 5104157" />
          </div>
          <div>
            <label for="playerName">球员名字</label>
            <input id="playerName" placeholder="例如 Victor Wembanyama" />
          </div>
          <div>
            <label for="statType">预测项目</label>
            <select id="statType">
              <option value="points">得分</option>
              <option value="rebounds">篮板</option>
              <option value="assists">助攻</option>
            </select>
          </div>
          <div>
            <label for="predictedValue">预测值</label>
            <input id="predictedValue" type="number" placeholder="例如 28" />
          </div>
        </div>
        <div style="margin-top: 14px">
          <label for="note">备注</label>
          <textarea id="note" placeholder="可选，例如：今天对位压力大，我猜篮板更高"></textarea>
        </div>
        <div class="form-grid" style="margin-top: 14px">
          <button id="savePrediction">保存预测</button>
          <button id="refreshList" class="secondary">刷新预测列表</button>
        </div>
      </section>

      <section class="grid two" style="margin-top: 18px">
        <article class="card">
          <h2>准确率趋势图</h2>
          <div id="chart" class="chart"></div>
        </article>
        <article class="card">
          <h2>预测记录</h2>
          <div id="storageStatus" class="ok" style="margin-bottom: 12px">正在检查存储状态...</div>
          <div id="predictionList" class="prediction-list"></div>
        </article>
      </section>
    </main>

    <script src="/app.js"></script>
    <script>
      const STORAGE_KEY = "nba-insight-local-predictions";
      const listEl = document.getElementById("predictionList");
      const chartEl = document.getElementById("chart");
      const statusEl = document.getElementById("storageStatus");
      let currentRows = [];
      let usingLocalStorage = false;

      function readLocalRows() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        } catch (error) {
          return [];
        }
      }

      function writeLocalRows(rows) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(rows));
      }

      function makeLocalId() {
        return `local-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function getFormPayload() {
        return {
          eventId: document.getElementById("eventId").value.trim(),
          playerId: document.getElementById("playerId").value.trim(),
          playerName: document.getElementById("playerName").value.trim(),
          statType: document.getElementById("statType").value,
          predictedValue: Number(document.getElementById("predictedValue").value),
          note: document.getElementById("note").value.trim()
        };
      }

      function toLocalRow(payload) {
        return {
          id: makeLocalId(),
          player_id: String(payload.playerId),
          player_name: payload.playerName,
          event_id: String(payload.eventId),
          stat_type: payload.statType,
          predicted_value: Number(payload.predictedValue),
          actual_value: null,
          accuracy_score: null,
          note: payload.note || "",
          created_at: new Date().toISOString(),
          source: "local"
        };
      }

      function fillFormFromItem(item) {
        document.getElementById("eventId").value = item.event_id;
        document.getElementById("playerId").value = item.player_id;
        document.getElementById("playerName").value = item.player_name;
        document.getElementById("statType").value = item.stat_type;
        document.getElementById("predictedValue").value = item.predicted_value;
        document.getElementById("note").value = item.note || "";
      }

      function renderChart(rows) {
        const verified = rows.filter(
          (item) => item.accuracy_score !== null && item.accuracy_score !== undefined
        );

        if (!verified.length) {
          chartEl.innerHTML = "<div>还没有已验证的数据。</div>";
          return;
        }

        chartEl.innerHTML = verified
          .slice(0, 8)
          .reverse()
          .map((item) => {
            const height = Math.max(20, Number(item.accuracy_score));
            return `<div class="bar" style="height:${height * 1.6}px"><span>${item.accuracy_score}</span></div>`;
          })
          .join("");
      }

      function renderList(rows) {
        currentRows = rows;

        if (!rows.length) {
          listEl.innerHTML = "<div class='prediction-item'>还没有预测记录。先保存一条吧。</div>";
          chartEl.innerHTML = "<div>还没有图表数据。</div>";
          return;
        }

        listEl.innerHTML = rows
          .map(
            (item) => `
              <div class="prediction-item">
                <div class="pill">${item.source === "local" ? "本地记录" : "云端记录"}</div>
                <h3>${item.player_name}</h3>
                <p>比赛 id：${item.event_id}</p>
                <p>项目：${item.stat_type}</p>
                <p>预测值：${item.predicted_value}</p>
                <p>实际值：${item.actual_value ?? "待验证"}</p>
                <p>准确率：${item.accuracy_score ?? "待验证"}</p>
                <p class="muted">${item.note || "无备注"}</p>
                <div class="form-grid">
                  <button data-action="verify" data-id="${item.id}">验证这条预测</button>
                  <button class="secondary" data-action="edit" data-id="${item.id}">填回表单</button>
                </div>
              </div>
            `
          )
          .join("");

        listEl.querySelectorAll("button[data-action]").forEach((button) => {
          button.addEventListener("click", () => {
            const item = currentRows.find((row) => row.id === button.dataset.id);
            if (!item) return;

            if (button.dataset.action === "verify") {
              window.verifyPrediction(item);
              return;
            }

            fillFormFromItem(item);
          });
        });

        renderChart(rows);
      }

      function showLocalMode(message) {
        usingLocalStorage = true;
        statusEl.className = "warning";
        statusEl.textContent = `${message} 当前会保存到这个浏览器，不会上传云端。`;
        renderList(readLocalRows());
      }

      async function loadPredictions() {
        listEl.innerHTML = "<div class='prediction-item'>正在加载预测记录...</div>";

        try {
          const data = await nbaInsight.apiGet("/api/predictions");

          if (data.offline) {
            showLocalMode(data.message || "云端存储暂不可用。");
            return;
          }

          usingLocalStorage = false;
          statusEl.className = "ok";
          statusEl.textContent = "Supabase 正常，预测会保存到云端。";
          renderList(data.rows || []);
        } catch (error) {
          showLocalMode(`云端连接失败：${error.message}`);
        }
      }

      async function savePrediction() {
        const payload = getFormPayload();

        if (!payload.eventId || !payload.playerId || !payload.playerName || !payload.predictedValue) {
          alert("请先填完整：比赛 id、球员 id、球员名字和预测值。");
          return;
        }

        try {
          if (!usingLocalStorage) {
            const result = await nbaInsight.apiSend("/api/predictions", "POST", payload);
            if (!result.offline) {
              alert("保存成功，已经进入云端记录。");
              loadPredictions();
              return;
            }
          }

          const rows = readLocalRows();
          rows.unshift(toLocalRow(payload));
          writeLocalRows(rows);
          alert("保存成功，已保存到当前浏览器。");
          showLocalMode("云端存储暂不可用。");
        } catch (error) {
          const rows = readLocalRows();
          rows.unshift(toLocalRow(payload));
          writeLocalRows(rows);
          alert("云端保存失败，已改为保存到当前浏览器。");
          showLocalMode(`云端保存失败：${error.message}`);
        }
      }

      window.verifyPrediction = async function verifyPrediction(item) {
        try {
          const result = await nbaInsight.apiSend("/api/predictions", "PATCH", {
            id: item.id,
            eventId: item.event_id,
            playerId: item.player_id,
            playerName: item.player_name,
            statType: item.stat_type,
            predictedValue: item.predicted_value,
            note: item.note
          });

          const updatedItem = {
            ...item,
            actual_value: result.actual.stats[item.stat_type],
            accuracy_score: result.accuracyScore,
            verified_at: new Date().toISOString()
          };

          if (item.source === "local" || usingLocalStorage) {
            const rows = readLocalRows().map((row) => (row.id === item.id ? updatedItem : row));
            writeLocalRows(rows);
            renderList(rows);
          } else {
            loadPredictions();
          }

          alert(`验证完成。实际值：${updatedItem.actual_value}，准确率：${result.accuracyScore}`);
        } catch (error) {
          alert(`验证失败：${error.message}。比赛可能还没结束，或 ESPN 暂时没有这场球员数据。`);
        }
      };

      document.getElementById("savePrediction").addEventListener("click", savePrediction);
      document.getElementById("refreshList").addEventListener("click", loadPredictions);
      loadPredictions();
    </script>
  </body>
</html>
